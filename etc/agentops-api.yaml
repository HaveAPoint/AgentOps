Name: agentops-api
Host: 0.0.0.0
Port: 8888


Auth:
  AccessSecret: agentops-l3-dev-secret
  AccessExpire: 3600

Postgres:
  Host: 127.0.0.1
  Port: 5432
  User: postgres
  Password: postgres
  DBName: agentops
  SSLMode: disable
  MaxOpenConns: 10
  MaxIdleConns: 5
  ConnMaxLifetimeSeconds: 600

Executor:
  TimeoutSeconds: 30
  AllowedRepoPaths:
    - "."
